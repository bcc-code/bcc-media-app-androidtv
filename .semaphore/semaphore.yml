version: v1.0
name: BCC Media Android TV
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2404

blocks:
  - name: Build
    dependencies: []
    task:
      secrets:
        - name: android-keystore-bcc-media-apps
        - name: android-play-store-api-linux
        - name: android-npaw
      prologue:
        commands:
          - checkout
          - sem-version java 21
      jobs:
        - name: Build release AAB
          commands:
            - cp /home/semaphore/google-play-service-account.json fastlane/google-play-service-account.json
            - bundle install

            # Play Console is the source of truth for versionCode.
            # next_version_code lane writes max(all tracks) + 1 to .next_version_code
            # (or 1 if every track is empty — brand-new listing).
            - bundle exec fastlane next_version_code
            - export BUILD_NUMBER=$(cat fastlane/.next_version_code)
            - echo "Using versionCode=$BUILD_NUMBER"
            - test -n "$BUILD_NUMBER" && test "$BUILD_NUMBER" -gt 0

            - keystore_path="$(pwd)/release.keystore"
            - echo "$KEYSTORE_FILE" | base64 -d > "$keystore_path"

            - |
              cat >> local.properties << EOF
              signing.storeFile=$keystore_path
              signing.storePassword=$KEYSTORE_PASSWORD
              signing.keyAlias=$KEY_ALIAS
              signing.keyPassword=$KEY_PASSWORD
              npaw.accountCode=$NPAW_ACCOUNT_CODE
              EOF

            # Install Android SDK (cached across runs)
            - export ANDROID_HOME="$HOME/android-sdk"
            - cache restore android-sdk
            - |
              if [ ! -d "$ANDROID_HOME/platforms/android-36" ]; then
                mkdir -p "$ANDROID_HOME/cmdline-tools"
                curl -sSL -o /tmp/cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
                unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_HOME/cmdline-tools"
                mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
                yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null
                "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-36" "build-tools;36.0.0"
              fi
            - cache store android-sdk $ANDROID_HOME

            - cache restore gradle-$(checksum gradle/libs.versions.toml),gradle
            - ./gradlew bundleRelease -PbuildNumber=$BUILD_NUMBER --no-daemon --console=plain --warning-mode=summary
            - cache store gradle-$(checksum gradle/libs.versions.toml) ~/.gradle/caches
            - artifact push workflow app/build/outputs/bundle/release/app-release.aab -d app-release.aab

  - name: Deploy
    dependencies: [Build]
    task:
      secrets:
        - name: android-play-store-api-linux
      jobs:
        - name: Upload to Google Play Internal
          commands:
            - checkout
            - cp /home/semaphore/google-play-service-account.json fastlane/google-play-service-account.json
            - artifact pull workflow app-release.aab -d app/build/outputs/bundle/release/app-release.aab
            - bundle install
            - bundle exec fastlane internal
