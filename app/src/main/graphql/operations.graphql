                __typename
                ... on Episode { id uuid duration progress watched season { title show { title } } }
                ... on Season { id title show { id } }
                ... on Show { id title description }
                ... on Page { code title }
                ... on Person { id }
              }
            }
          }
        }
        ... on DefaultGridSection {
          metadata { myList }
          items(first: 20) {
            total
