query Search($queryString: String!, $first: Int, $offset: Int) {
  search(queryString: $queryString, first: $first, offset: $offset) {
    hits
    result {
      __typename
      id
      title
      description
      image
      ... on EpisodeSearchItem {
        showTitle
        seasonTitle
        duration
      }
      ... on SeasonSearchItem {
        seasonShowTitle: showTitle
      }
    }
  }
}

query GetEpisodeDetail($episodeId: ID!) {
  episode(id: $episodeId) {
    id
    uuid
    title
    description
    image
    publishDate
    productionDate
    duration
    number
    progress
    watched
    locked
    ageRating
    season {
      id
      title
      number
      show { id type title }
    }
    chapters { id title start duration }
  }
}

query GetEpisodeForAutoplay($episodeId: ID!) {
  episode(id: $episodeId) {
    id
    title
    number
    season {
      id
      episodes(first: 100) {
        total
        items {
          id
          title
          number
        }
      }
    }
  }
}

query GetEpisodeStreams($id: ID!) {
  episode(id: $id) {
    title
    description
    number
    duration
    image
    season { title number show { title } }
    chapters { title start duration }
    streams {
      url
      type
      audioLanguages
      subtitleLanguages
      videoLanguage
    }
  }
}

query GetSeasonEpisodes($seasonId: ID!, $firstEpisodes: Int) {
  season(id: $seasonId) {
    id
    title
    image
    number
    show { id title }
    episodes(first: $firstEpisodes) {
      total
      items {
        id
        uuid
        title
        image
        publishDate
        duration
        number
        progress
        watched
        description
        ageRating
      }
    }
  }
}

query GetShow($showId: ID!) {
  show(id: $showId) {
    id
    title
    description
    image
    seasons(first: 20) {
      items {
        id
        title
        number
        image
        episodes(first: 50) {
          total
          items {
            id
            uuid
            title
            image
            duration
            number
            progress
            watched
            publishDate
          }
        }
      }
    }
  }
}

query GetMe {
  me {
    analytics { anonymousId }
    bccMember
  }
}

mutation SetEpisodeProgress($id: ID!, $progress: Int!, $duration: Int!) {
  setEpisodeProgress(id: $id, progress: $progress, duration: $duration) {
    id
    progress
    watched
  }
}

query GetMyList {
  myList {
    id
    entries(first: 100) {
      items {
        id
        item {
          __typename
          ... on Episode {
            id
            title
            image
            duration
            progress
            watched
          }
          ... on Show {
            id
            title
            image
          }
        }
      }
    }
  }
}

mutation AddEpisodeToMyList($episodeId: ID!) {
  addEpisodeToMyList(episodeId: $episodeId) {
    entryId
  }
}

mutation AddShowToMyList($showId: ID!) {
  addShowToMyList(showId: $showId) {
    entryId
  }
}

mutation RemoveFromMyList($entryId: UUID!) {
  removeEntryFromMyList(entryId: $entryId) {
    id
  }
}


query GetPersonContributions($id: ID!, $contentTypes: [String!]) {
  person(id: $id) {
    contributions(first: 100, contentTypes: $contentTypes) {
      total
      items {
        item {
          __typename
          ... on Episode {
            id
            title
            image
            duration
            progress
            watched
            season { title show { title } }
          }
          ... on Chapter {
            id
            title
            duration
            start
            episode { id title image season { title show { title } } }
          }
        }
      }
    }
  }
}

query GetPerson($id: ID!) {
  person(id: $id) {
    id
    name
    image
    contributionContentTypes {
      type { code title }
      count
    }
    contributions(first: 100) {
      total
      items {
        item {
          __typename
          ... on Episode {
            id
            title
            image
            duration
            progress
            watched
            season { title show { title } }
          }
          ... on Chapter {
            id
            title
            duration
            start
            episode { id title image season { title show { title } } }
          }
        }
      }
    }
  }
}
