                __typename
                ... on Episode { id uuid duration progress watched season { title show { title } } }
                ... on Season { id title show { id } }
                ... on Show { id title description }
                ... on Page { code title }
              }
            }
          }
        }
        ... on IconSection {
          metadata { myList }
          items(first: 20) {
            total
            items {
              id
              image
              title
              description
              item {
                __typename
                ... on Episode { id uuid duration progress watched season { title show { title } } }
                ... on Season { id title show { id } }
                ... on Show { id title description }
                ... on Page { code title }
              }
            }
          }
        }
        ... on LabelSection {
          metadata { myList }
          items(first: 20) {
            total
            items {
              id
              image
              title
              description
