query GetApplication {
  application {
    code
    page { code title }
    searchPage { code title }
  }
}

query GetPage($code: String!, $first: Int, $offset: Int) {
  page(code: $code) {
    id
    title
    code
    sections(first: $first, offset: $offset) {
      total
      offset
      first
      items {
        __typename
        id
        title
        description
        ... on ItemSection {
          metadata { myList }
          items(first: 20) {
            total
            items {
              id
              image
              title
              description
              item {
                __typename
                ... on Episode { id uuid duration progress watched season { title show { title } } }
                ... on Season { id title show { id } }
                ... on Show { id title description }
                ... on Page { code title }
              }
            }
          }
        }
        ... on FeaturedSection {
          metadata { myList }
          items(first: 20) {
            total
            items {
              id
              image
              title
              description
              item {
                __typename
                ... on Episode { id uuid duration progress watched season { title show { title } } }
                ... on Season { id title show { id } }
                ... on Show { id title description }
                ... on Page { code title }
              }
            }
          }
        }
        ... on DefaultSection {
          metadata { myList }
          items(first: 20) {
            total
